<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f0f0f0" />
  <title>Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Gochi+Hand&family=Permanent+Marker&family=Schoolbell&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="font-school text-marker-black selection:bg-crayon-yellow">
  <div class="max-w-6xl mx-auto drawing-sheet my-8 p-4 md:p-12 border-[12px] border-white min-h-screen">
    <header class="relative z-30 mb-20 flex justify-between items-center">
      <div class="cut-out bg-crayon-red p-4 -rotate-2 zig-zag-edge text-white">
        <h1 class="font-chunky text-3xl md:text-5xl uppercase"></span>MY Portfolio!</h1>
      </div>
      <span class="font-marker text-crayon-red text-2xl">HI THERE!</span>
      <nav class="hidden md:flex gap-2 flex-wrap justify-end">
        <a href="#experience" class="cut-out bg-crayon-yellow px-4 py-2 rotate-1 font-marker hover:bg-white border-2 border-marker-black text-xs md:text-sm">Work</a>
        <a href="#projects" class="cut-out bg-crayon-blue px-4 py-2 -rotate-1 font-marker text-white hover:bg-white hover:text-marker-black border-2 border-marker-black text-xs md:text-sm">Projects</a>
        <a href="#skills" class="cut-out bg-crayon-green px-4 py-2 rotate-2 font-marker text-white hover:bg-white hover:text-marker-black border-2 border-marker-black text-xs md:text-sm">Skills</a>
      </nav>
    </header>

    <main class="relative">
      <!-- Hero Section -->
      <section class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start mb-32">
        <div class="space-y-8 relative">
          <!-- Intro Box -->
          <div class="cut-out bg-paper-white border-4 border-dashed border-crayon-blue p-8 rotate-1 shadow-lg relative">
            <div class="glue-blob -top-2 -left-2"></div>
            <h2 class="font-chunky text-5xl md:text-6xl text-crayon-blue leading-none mt-2"><span data-name></span></h2>
            <div class="notebook-lines p-4 mt-6">
              <p class="text-lg md:text-2xl leading-relaxed"><span data-headline></span></p>
            </div>
            <div id="summaryBox" class="hidden mt-6 text-lg"></div>
          </div>

          <!-- Contact Buttons -->
          <div class="flex gap-4 flex-wrap">
            <a id="emailLink" class="cut-out bg-construction-orange text-white font-chunky text-sm md:text-lg px-6 md:px-10 py-3 md:py-4 -rotate-3 border-b-4 md:border-b-8 border-black active:border-b-0 active:translate-y-2 hover:bg-orange-600" target="_blank" rel="noopener">EMAIL ME!</a>
            <a id="githubLink" class="cut-out bg-marker-black text-white font-marker text-sm md:text-lg px-6 py-3 md:py-4 rotate-2 hover:bg-gray-800" target="_blank" rel="noopener">MY CODE</a>
            <a id="linkedinLink" class="cut-out bg-crayon-blue text-white font-marker text-sm md:text-lg px-6 py-3 md:py-4 -rotate-1 hover:bg-blue-700" target="_blank" rel="noopener">LINKEDIN</a>
          </div>
        </div>

        <!-- Profile Picture -->
        <div class="relative flex justify-center">
          <div class="cut-out bg-white p-6 rotate-6 shadow-2xl border-2 border-gray-100 max-w-sm">
            <div id="profilePicture" class="w-full aspect-square bg-crayon-yellow rounded-full flex items-center justify-center overflow-hidden border-8 border-white">
              <span class="text-8xl">👨‍💼</span>
            </div>
            <p class="font-handwritten text-2xl md:text-3xl text-center mt-4 text-crayon-red">That's me!</p>
          </div>
          <span class="material-symbols-outlined absolute -top-10 left-10 text-crayon-yellow text-5xl md:text-6xl animate-bounce">star</span>
          <span class="material-symbols-outlined absolute bottom-0 right-0 text-crayon-green text-5xl md:text-6xl rotate-45">build</span>
        </div>
      </section>

      <!-- Experience Section -->
      <section id="experience" class="mb-32 relative">
        <div class="cut-out bg-construction-orange text-white px-8 py-2 inline-block -rotate-2 mb-12 border-4 border-white">
          <h3 class="font-chunky text-3xl md:text-4xl">MY AWESOME WORK!</h3>
        </div>
        <div id="experienceGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Experience items will be inserted here -->
        </div>
      </section>

      <!-- Projects Section -->
      <section id="projects" class="mb-32 relative">
        <div class="cut-out bg-crayon-green text-white px-8 py-2 inline-block rotate-1 mb-12 border-4 border-white">
          <h3 class="font-chunky text-3xl md:text-4xl">COOL PROJECTS!</h3>
        </div>
        <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
          <!-- Project items will be inserted here -->
        </div>
      </section>

      <!-- Education Section -->
      <section id="education" class="mb-32 relative">
        <div class="cut-out bg-crayon-red text-white px-8 py-2 inline-block -rotate-1 mb-12 border-4 border-white">
          <h3 class="font-chunky text-3xl md:text-4xl">MY SCHOOLING!</h3>
        </div>
        <div id="educationGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Education items will be inserted here -->
        </div>
      </section>

      <!-- Skills Section -->
      <section id="skills" class="mb-32 relative">
        <div class="cut-out bg-crayon-blue text-white px-8 py-2 inline-block rotate-2 mb-12 border-4 border-white">
          <h3 class="font-chunky text-3xl md:text-4xl">WHAT I CAN DO!</h3>
        </div>
        <div id="skillsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Skills will be inserted here -->
        </div>
      </section>

      <!-- Languages Section -->
      <section id="languages" class="mb-32 relative">
        <div class="cut-out bg-construction-orange text-white px-8 py-2 inline-block -rotate-1 mb-12 border-4 border-white">
          <h3 class="font-chunky text-3xl md:text-4xl">LANGUAGES!</h3>
        </div>
        <div id="languagesGrid" class="flex flex-wrap gap-4">
          <!-- Languages will be inserted here -->
        </div>
      </section>

      <!-- Contact Section -->
      <section class="cut-out bg-marker-black p-8 md:p-12 -rotate-1 shadow-2xl relative overflow-hidden text-white zig-zag-edge">
        <div class="relative z-10">
          <h3 class="font-chunky text-4xl md:text-5xl mb-6 italic text-crayon-yellow">LET'S CONNECT!</h3>
          <p class="text-xl md:text-2xl mb-10 text-paper-white/80" id="contactMessage">Want to work together? Get in touch!</p>
          <div class="space-y-6 max-w-xl">
            <div class="flex flex-col gap-2">
              <label class="font-marker text-crayon-blue text-lg md:text-xl">YOUR EMAIL:</label>
              <input id="contactEmail" class="bg-white border-4 border-crayon-blue p-3 md:p-4 text-marker-black text-base md:text-lg font-school placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-crayon-yellow" placeholder="your@email.com" type="email" />
            </div>
            <button class="bg-crayon-yellow text-marker-black px-8 md:px-12 py-4 md:py-5 font-chunky text-lg md:text-2xl hover:scale-110 transition-transform flex items-center gap-4 border-4 border-white shadow-[8px_8px_0px_#4d94ff]">
              SEND IT! <span class="material-symbols-outlined">send</span>
            </button>
          </div>
        </div>
        <span class="material-symbols-outlined absolute -bottom-10 -right-10 text-[10rem] md:text-[15rem] text-white/10 -rotate-12">mail</span>
      </section>
    </main>

    <footer class="mt-20 md:mt-32 pb-10 flex flex-col items-center gap-8 text-center">
      <div class="cut-out bg-crayon-blue text-white px-6 py-2 rotate-2 border-2 border-white">
        <p class="font-marker text-sm md:text-base"><span data-name></span> © <span id="year"></span></p>
      </div>
    </footer>
  </div>

  <script src="../../config.js"></script>
  <script src="../../src/rxresume.js"></script>
  <script src="./app.js"></script>
</body>
</html>
