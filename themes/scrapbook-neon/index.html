<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Scrapbook Neon Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Rock+Salt&family=Rubik+Mono+One&family=Special+Elite&family=Stalinist+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Fixed header -->
  <header class="topbar">
    <div class="zine-badge">WELCOME</div>
    <nav class="topnav">
      <a href="#experience" class="nav-btn nav-white">WORK</a>
      <a href="#projects" class="nav-btn nav-green">PROJECTS</a>
      <a href="#skills" class="nav-btn nav-pink">SKILLS</a>
      <a id="emailLink" class="nav-btn nav-dark" target="_blank" rel="noopener">CONTACT</a>
    </nav>
  </header>

  <main class="page">

    <!-- HERO -->
    <section class="hero">

      <!-- Name row: full-width letter cutouts at top -->
      <div class="name-row">
        <div class="name-cutouts" id="nameCutouts"></div>
        <div class="name-badge" data-headline></div>
      </div>

      <!-- Two-column body below name -->
      <div class="hero-body">

        <!-- Left: description torn panel -->
        <div class="hero-panel torn-border">
          <div class="staple staple-tl"></div>
          <div class="staple staple-tr"></div>
          <div id="summaryText" class="panel-summary"></div>
          <div class="panel-actions">
            <a id="githubLink" class="action-btn" target="_blank" rel="noopener">SEE WORK</a>
            <a id="linkedinLink" class="action-btn action-outline" target="_blank" rel="noopener">LINKEDIN</a>
          </div>
        </div>

        <!-- Right: polaroid photo -->
        <div class="hero-polaroid-wrap">
          <div class="polaroid">
            <div id="profileArt" class="polaroid-photo"></div>
            <p class="polaroid-caption" data-name></p>
          </div>
        </div>

      </div>
    </section>

    <!-- EXPERIENCE -->
    <section id="experience" class="section">
      <h2 class="section-label label-pink">EXHIBIT A: EXPERIENCE</h2>
      <div class="cards-grid two" id="experienceList"></div>
    </section>

    <!-- PROJECTS -->
    <section id="projects" class="section">
      <h2 class="section-label label-green">BUILT THINGS</h2>
      <div class="cards-grid three" id="projectsGrid"></div>
    </section>

    <!-- EDUCATION -->
    <section id="education" class="section">
      <h2 class="section-label label-white">EDUCATION</h2>
      <div class="cards-grid two" id="educationList"></div>
    </section>

    <!-- SKILLS -->
    <section id="skills" class="section">
      <h2 class="section-label label-green">TOOLBOX</h2>
      <div class="skills-cloud" id="skillsCloud"></div>
    </section>

    <!-- LANGUAGES -->
    <section id="languages" class="section">
      <h2 class="section-label label-pink">LANGUAGES</h2>
      <div class="skills-cloud" id="languagesList"></div>
    </section>

    <!-- CONTACT CTA -->
    <section class="contact-cta section">
      <div class="contact-inner">
        <h3 class="contact-title">STOP LURKING, START TALKING</h3>
        <p class="contact-sub">Got a project that isn't boring? Get in touch.</p>
        <a id="contactBtn" class="contact-action" target="_blank" rel="noopener">SEND DISPATCH</a>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-left">
      <span class="footer-name" data-name></span>
      <p class="footer-copy">© <span id="year"></span> // UNAUTHORIZED REPRODUCTION IS ENCOURAGED</p>
    </div>
    <div class="footer-links">
      <a id="footerGithub" target="_blank" rel="noopener">GitHub</a>
      <a id="footerLinkedin" target="_blank" rel="noopener">LinkedIn</a>
      <a id="footerEmail" target="_blank" rel="noopener">Email</a>
      <a href="/index.html">Themes</a>
    </div>
  </footer>

  <script src="../../config.js"></script>
  <script src="../../src/rxresume.js"></script>
  <script src="./app.js"></script>
</body>
</html>
