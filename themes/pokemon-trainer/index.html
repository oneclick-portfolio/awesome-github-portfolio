<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#cc0000" />
  <title>Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="pokedex-device">
    <!-- Left Panel -->
    <div class="pokedex-left-panel">
      <div class="left-top-decor">
        <div class="led led--big"></div>
        <div class="led led--sm led--red"></div>
        <div class="led led--sm led--yellow"></div>
        <div class="led led--sm led--green"></div>
      </div>
      <div class="left-screen">
        <div class="left-screen__inner">
          <div class="portrait-frame" id="profileArt">
            <div class="portrait-placeholder pixel">??</div>
          </div>
          <div class="trainer-info">
            <div class="info-row">
              <span class="info-label pixel">NAME</span>
              <span class="info-value pixel" data-name></span>
            </div>
            <div class="info-row">
              <span class="info-label pixel">CLASS</span>
              <span class="info-value pixel" data-headline></span>
            </div>
          </div>
          <div class="trainer-stats">
            <div class="stat-line"><span class="pixel">HP</span><span class="stat-bar"><i style="width:92%"></i></span></div>
            <div class="stat-line"><span class="pixel">ATK</span><span class="stat-bar"><i style="width:78%"></i></span></div>
            <div class="stat-line"><span class="pixel">DEF</span><span class="stat-bar"><i style="width:85%"></i></span></div>
            <div class="stat-line"><span class="pixel">SPD</span><span class="stat-bar"><i style="width:70%"></i></span></div>
          </div>
          <div class="trainer-links">
            <a id="githubLink" class="dex-link pixel" target="_blank" rel="noopener">GitHub</a>
            <a id="linkedinLink" class="dex-link pixel" target="_blank" rel="noopener">LinkedIn</a>
            <a id="emailLink" class="dex-link pixel" target="_blank" rel="noopener">Email</a>
          </div>
        </div>
      </div>
      <div class="left-bottom-decor">
        <div class="speaker-grille">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Hinge -->
    <div class="pokedex-hinge"></div>

    <!-- Right Panel -->
    <div class="pokedex-right-panel">
      <div class="right-screen">
        <div class="right-screen__header pixel">
          <span class="page-title" id="pageTitle">TRAINER</span>
          <span class="page-num" id="pageNum">1/6</span>
        </div>
        <div class="right-screen__content" id="screenContent">
          <!-- Page: Trainer -->
          <div class="dex-page is-active" data-page="trainer">
            <p class="trainer-summary" id="summaryText"></p>
            <div class="trainer-id pixel">ID No. 001</div>
          </div>

          <!-- Page: Battle Log -->
          <div class="dex-page" data-page="battle">
            <h2 class="page-section-title pixel">BATTLE RECORD</h2>
            <div id="experienceList" class="dex-entries"></div>
          </div>

          <!-- Page: Item Bag -->
          <div class="dex-page" data-page="bag">
            <h2 class="page-section-title pixel">ITEM BAG</h2>
            <div id="projectsGrid" class="dex-entries"></div>
          </div>

          <!-- Page: Pokédex -->
          <div class="dex-page" data-page="pokedex">
            <h2 class="page-section-title pixel">POKEDEX ENTRIES</h2>
            <div id="educationList" class="dex-entries"></div>
            <div id="certificationsWrap">
              <h3 class="page-section-title pixel">CERTIFIED MOVES</h3>
              <div id="certificationsList" class="dex-entries"></div>
            </div>
            <div id="publicationsWrap">
              <h3 class="page-section-title pixel">FIELD NOTES</h3>
              <div id="publicationsList" class="dex-entries"></div>
            </div>
          </div>

          <!-- Page: Moves -->
          <div class="dex-page" data-page="moves">
            <h2 class="page-section-title pixel">MOVE SET</h2>
            <div id="skillsCloud" class="moves-grid"></div>
            <div id="languagesWrap">
              <h3 class="page-section-title pixel">LANGUAGES</h3>
              <div id="languagesList" class="dex-entries"></div>
            </div>
          </div>

          <!-- Page: Guild -->
          <div class="dex-page" data-page="guild">
            <div id="awardsWrap">
              <h2 class="page-section-title pixel">HALL OF FAME</h2>
              <div id="awardsList" class="dex-entries"></div>
            </div>
            <div id="volunteerWrap">
              <h3 class="page-section-title pixel">GUILD QUESTS</h3>
              <div id="volunteerList" class="dex-entries"></div>
            </div>
            <div id="interestsWrap">
              <h3 class="page-section-title pixel">INTERESTS</h3>
              <div id="interestsList" class="moves-grid"></div>
            </div>
            <div id="referencesWrap">
              <h3 class="page-section-title pixel">ALLIES</h3>
              <div id="referencesList" class="dex-entries"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="pokedex-controls">
        <button class="dpad-btn dpad-btn--left" id="btnPrev" aria-label="Previous page">&#9664;</button>
        <div class="page-dots" id="pageDots"></div>
        <button class="dpad-btn dpad-btn--right" id="btnNext" aria-label="Next page">&#9654;</button>
      </div>
    </div>
  </div>

  <!-- Custom Sections (appended dynamically) -->
  <div id="customSectionsContainer" hidden></div>

  <script src="../../config.js"></script>
  <script src="../../src/rxresume.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
